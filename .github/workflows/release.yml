name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Target platforms'
        required: true
        type: choice
        options:
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
          - 'linux/arm64'
        default: 'linux/amd64,linux/arm64'
      version:
        description: 'Image version tag (without v prefix; defaults to latest git tag)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Release
        id: release
        run: |
          BEFORE_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -1 || echo "")
          npx semantic-release
          git fetch --tags --force origin
          AFTER_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -1 || echo "")
          if [ "$AFTER_TAG" != "$BEFORE_TAG" ] && [ -n "$AFTER_TAG" ]; then
            echo "version=${AFTER_TAG#v}" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Resolves the image version and build matrix once so both the matrix build
  # jobs and the manifest-merge job can use the same values without duplicating logic.
  prepare:
    needs: [release]
    if: |
      always() && (
        (needs.release.result == 'success' && needs.release.outputs.version != '') ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      matrix: ${{ steps.matrix.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "${{ inputs.version }}" ]; then
              echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
            else
              git fetch --tags
              LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | head -1 || echo "")
              echo "value=${LATEST_TAG#v}" >> $GITHUB_OUTPUT
            fi
          else
            echo "value=${{ needs.release.outputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Compute build matrix
        id: matrix
        run: |
          PLATFORMS="${{ github.event_name == 'workflow_dispatch' && inputs.platforms || 'linux/amd64,linux/arm64' }}"
          MATRIX='[]'
          if echo "$PLATFORMS" | grep -q 'linux/amd64'; then
            MATRIX=$(echo "$MATRIX" | jq '. += [{"platform":"linux/amd64","runner":"ubuntu-latest","slug":"amd64"}]')
          fi
          if echo "$PLATFORMS" | grep -q 'linux/arm64'; then
            MATRIX=$(echo "$MATRIX" | jq '. += [{"platform":"linux/arm64","runner":"ubuntu-24.04-arm","slug":"arm64"}]')
          fi
          echo "value=$(echo "$MATRIX" | jq -c '{"include":.}')" >> $GITHUB_OUTPUT

  # Build each platform on a native runner to avoid QEMU SIGILL failures with
  # Node.js 20 native addons (bcrypt, etc.). Each job pushes by digest (no tag)
  # and uploads the digest for the merge job to assemble the manifest.
  docker:
    needs: [release, prepare]
    if: |
      always() &&
      needs.prepare.result == 'success'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout release tag
        if: github.event_name == 'push'
        run: |
          git fetch --tags --force origin
          git checkout v${{ needs.prepare.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=build-${{ matrix.slug }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.slug }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Download all per-platform digests and assemble a single multi-arch manifest.
  merge:
    needs: [prepare, docker]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      needs.docker.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=v${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ needs.prepare.outputs.version }}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)
